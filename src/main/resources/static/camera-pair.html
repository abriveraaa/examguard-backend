<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ExamGuard Camera Pairing</title>

    <style>

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;

            width: 100%;
            height: 100%;

            overflow: hidden;

            font-family: Arial, sans-serif;
            background: black;
            color: white;
        }

        body {
            position: relative;
        }

        video {
            position: fixed;

            top: 0;
            left: 0;

            width: 100vw;
            height: 100vh;

            object-fit: cover;

            background: black;
        }

        .overlay {
            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            display: flex;
            flex-direction: column;
            justify-content: space-between;

            padding: 24px;

            background:
                    linear-gradient(
                            to bottom,
                            rgba(0,0,0,0.65),
                            rgba(0,0,0,0.15),
                            rgba(0,0,0,0.75)
                    );

            pointer-events: none;
        }

        .top-section {
            text-align: center;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            line-height: 1.5;
            color: #e5e7eb;
        }

        .bottom-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status {
            width: 100%;

            padding: 16px;
            border-radius: 14px;

            text-align: center;
            font-weight: bold;

            backdrop-filter: blur(12px);

            font-size: 15px;
        }

        .success {
            background: rgba(16, 185, 129, 0.25);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .error {
            background: rgba(239, 68, 68, 0.25);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .warning {
            background: rgba(245, 158, 11, 0.25);
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

    </style>
</head>
<body>

<div class="card">

    <h1>ExamGuard Camera Pairing</h1>

    <p>
        Place your phone at approximately 45° angle.
        Ensure your face, desk, hands, and laptop screen are visible.
    </p>

    <video id="video" autoplay playsinline muted></video>

    <div id="status" class="status warning">
        Requesting camera permission...
    </div>

</div>

<script>

    const token = window.location.pathname.split("/").pop();

    const statusBox = document.getElementById("status");
    const video = document.getElementById("video");

    let heartbeatInterval = null;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    let previewInterval = null;

    async function initialize() {

        try {

            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "environment"
                },
                audio: false
            });

            video.srcObject = stream;

            statusBox.innerText = "Camera connected. Pairing device...";
            statusBox.className = "status warning";

            await pairDevice();
            startPreviewStreaming();

            heartbeatInterval = setInterval(sendHeartbeat, 5000);

        } catch (error) {

            console.error(error);

            statusBox.innerText =
                "Camera permission denied or unavailable.";

            statusBox.className = "status error";
        }
    }

    function startPreviewStreaming() {
        if (previewInterval) {
            clearInterval(previewInterval);
        }

        previewInterval = setInterval(uploadPreviewFrame, 900);
    }

    async function uploadPreviewFrame() {
        try {
            if (!video.videoWidth || !video.videoHeight) {
                return;
            }

            const targetWidth = 480;
            const scale = targetWidth / video.videoWidth;
            const targetHeight = Math.round(video.videoHeight * scale);

            canvas.width = targetWidth;
            canvas.height = targetHeight;

            ctx.drawImage(video, 0, 0, targetWidth, targetHeight);

            canvas.toBlob(async function(blob) {
                if (!blob) return;

                const formData = new FormData();
                formData.append("frame", blob, "preview.jpg");

                await fetch(`/exam-camera/sessions/${token}/preview-frame`, {
                    method: "POST",
                    headers: {
                        "ngrok-skip-browser-warning": "true"
                    },
                    body: formData
                });

            }, "image/jpeg", 0.55);

        } catch (error) {
            console.error("Preview frame upload failed.", error);
        }
    }

    async function pairDevice() {

        try {

            const response = await fetch(
                `/exam-camera/sessions/${token}/pair`,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "true"
                    },
                    body: JSON.stringify({
                        deviceLabel: navigator.userAgent
                    })
                }
            );

            if (!response.ok) {
                throw new Error("Failed to pair device.");
            }

            statusBox.innerText =
                "Phone paired successfully. Keep this device active during the exam.";

            statusBox.className = "status success";

        } catch (error) {

            console.error(error);

            statusBox.innerText =
                "Failed to pair phone.";

            statusBox.className = "status error";
        }
    }

    async function sendHeartbeat() {

        try {

            await fetch(
                `/exam-camera/sessions/${token}/heartbeat`,
                {
                    method: "POST",
                    headers: {
                        "ngrok-skip-browser-warning": "true"
                    }
                }
            );

        } catch (error) {

            console.error("Heartbeat failed.", error);
        }
    }

    initialize();

</script>

</body>
</html>
