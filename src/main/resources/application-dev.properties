spring.application.name=examguard-backend

# =========================
# DATABASE - LOCAL POSTGRES
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:examguard}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# =========================
# REDIS - LOCAL
# =========================
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# PERFORMANCE
# =========================
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# =========================
# FILE UPLOAD - LOCAL
# =========================
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=250MB

app.upload.dir=uploads
examguard.ai-assets.dir=uploads/ai
profile.upload.dir=uploads/profiles
evidence.upload.dir=uploads/evidence
exam.upload.dir=uploads/exams

# =========================
# MAIL - LOCAL DEV
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =========================
# REGISTRAR API
# =========================
registrar.api.base-url=${REGISTRAR_API_BASE_URL:https://69eda66eaf4ff533142bd1b1.mockapi.io/registrar/}
registrar.sync-on-startup=false

# =========================
# APP BASE URL
# =========================
app.base-url=${APP_BASE_URL:http://localhost:8080}

# =========================
# JWT
# =========================
jwt.secret=${JWT_SECRET:dev-secret-change-me}
jwt.expiration-ms=86400000

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=false